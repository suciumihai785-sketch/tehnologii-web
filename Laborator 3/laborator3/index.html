<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laborator 3 - Acasa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="welcomeMessage">Bine ai venit, Vizitator!</h1>
        <p class="small" id="visitsMessage">Vizita numarul: 1</p>

        <nav class="nav">
            <a href="preferences.html">Setari Preferinte</a>
            <a href="cookies-info.html">Vizualizare Cookies</a>
            <a href="login.html">Autentificare</a>
            <a href="register.html">Inregistrare</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="cart.html">Cos</a>
        </nav>

        <div class="card">
            <h2>Cookies active</h2>
            <table>
                <thead>
                    <tr><th>Nume</th><th>Valoare</th></tr>
                </thead>
                <tbody id="cookiesTable"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>localStorage</h2>
            <table>
                <thead>
                    <tr><th>Cheie</th><th>Valoare</th></tr>
                </thead>
                <tbody id="localTable"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>sessionStorage</h2>
            <table>
                <thead>
                    <tr><th>Cheie</th><th>Valoare</th></tr>
                </thead>
                <tbody id="sessionTable"></tbody>
            </table>
        </div>

        <button class="btn-danger" id="clearAllBtn">Sterge Tot</button>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        function applyThemeFromCookie() {
            const theme = CookieManager.get('theme') || 'light';
            document.body.classList.remove('light', 'dark');
            document.body.classList.add(theme === 'dark' ? 'dark' : 'light');
        }

        function toDisplayValue(value) {
            return typeof value === 'string' ? value : JSON.stringify(value);
        }

        function fillTable(tbodyId, dataObj) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            const entries = Object.entries(dataObj || {});
            if (!entries.length) {
                tbody.innerHTML = '<tr><td colspan="2">Nu exista date.</td></tr>';
                return;
            }
            entries.forEach(([key, value]) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${key}</td><td>${toDisplayValue(value)}</td>`;
                tbody.appendChild(tr);
            });
        }

        function initPage() {
            applyThemeFromCookie();

            const username = CookieManager.get('username') || 'Vizitator';
            document.getElementById('welcomeMessage').textContent = `Bine ai venit, ${username}!`;

            const visits = parseInt(CookieManager.get('visits') || '0', 10) + 1;
            CookieManager.set('visits', visits, 365);
            document.getElementById('visitsMessage').textContent = `Vizita numarul: ${visits}`;

            fillTable('cookiesTable', CookieManager.getAll());
            fillTable('localTable', StorageManager.getAllLocal());
            fillTable('sessionTable', StorageManager.getAllSession());
        }

        document.getElementById('clearAllBtn').addEventListener('click', function() {
            CookieManager.deleteAll();
            StorageManager.clearLocal();
            StorageManager.clearSession();
            alert('Toate datele au fost sterse.');
            location.reload();
        });

        initPage();
    </script>
</body>
</html>
